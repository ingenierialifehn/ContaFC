version: '3.9'

services:
  # ─── MySQL 8.0 ───────────────────────────────────────────────────────────────
  contafc_db:
    image: mysql:8.0
    container_name: contafc_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-R00tS3cur3!}
      MYSQL_DATABASE: ${DB_NAME:-contafc}
      MYSQL_USER: ${DB_USER:-contafc_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-C0nt4FC!2026}
    volumes:
      - db_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
      - ./database/seed.sql:/docker-entrypoint-initdb.d/02_seed.sql:ro
    ports:
      - "3307:3306"
    networks:
      - contafc_net
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD:-R00tS3cur3!}" ]
      interval: 10s
      timeout: 5s
      retries: 10

  # ─── Firebird 3.0 (Corregido para Red y Acceso) ──────────────────────────────
  firebird:
    image: jacobalberty/firebird:v3.0
    container_name: contafc_firebird
    restart: unless-stopped
    environment:
      - ISC_PASSWORD=masterkey
      - FIREBIRD_DATABASE=dummy.fdb
      - FIREBIRD_USER=contafc
      - FIREBIRD_PASSWORD=masterkey
      # Permite a Firebird abrir archivos en la carpeta /databases
      - FIREBIRD_DATABASE_ACCESS=Full
      # Obliga al servidor a escuchar peticiones de red externas al contenedor
      - RemoteBindAddress=0.0.0.0
    volumes:
      - ./tmp:/databases
      - firebird_data:/firebird/data
    ports:
      - "3050:3050"
    networks:
      - contafc_net

  # ─── PHP 8.4 FPM ─────────────────────────────────────────────────────────────
  php:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: contafc_php
    restart: unless-stopped
    volumes:
      - ./:/var/www/html/contafc:rw
      - ./tmp:/databases
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini:ro
    environment:
      DB_HOST: contafc_db
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-contafc}
      DB_USER: ${DB_USER:-contafc_user}
      DB_PASSWORD: ${DB_PASSWORD:-C0nt4FC!2026}
      # Host debe coincidir con el nombre del servicio 'firebird'
      FIREBIRD_HOST: firebird
      FIREBIRD_PORT: 3050
      FIREBIRD_PASSWORD: masterkey
      APP_ENV: ${APP_ENV:-development}
      APP_SECRET: ${APP_SECRET:-ch4ng3m3_pr0duct10n_s3cr3t_k3y}
      APP_TIMEZONE: America/Tegucigalpa
    depends_on:
      contafc_db:
        condition: service_healthy
    networks:
      - contafc_net

  # ─── Nginx ───────────────────────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: contafc_nginx
    restart: unless-stopped
    ports:
      - "8082:80"
    volumes:
      - ./:/var/www/html/contafc:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php
    networks:
      - contafc_net

  # ─── phpMyAdmin ──────────────────────────────────────────────────────────────
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: contafc_pma
    restart: unless-stopped
    ports:
      - "8083:80"
    environment:
      PMA_HOST: contafc_db
      PMA_USER: ${DB_USER:-contafc_user}
      PMA_PASSWORD: ${DB_PASSWORD:-C0nt4FC!2026}
      UPLOAD_LIMIT: 300M
    depends_on:
      contafc_db:
        condition: service_healthy
    networks:
      - contafc_net

volumes:
  db_data:
    driver: local
  firebird_data:
    driver: local

networks:
  contafc_net:
    driver: bridge
